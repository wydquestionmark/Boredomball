<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Keepy Uppy</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      touch-action: none;
      user-select: none;
      font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100dvh;
      background: white;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: rgba(65,184,188,.75);
      font: 900 18px Impact, Haettenschweiler, 'Arial Black', sans-serif;
      letter-spacing: .06em;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">USE ARROW KEYS OR DRAG TO CONTROL THE BAR</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    let W = window.innerWidth;
    let H = window.innerHeight;
    let dpr = 1;
    let balls = [];
    let seagulls = [];

    const keys = { left: false, right: false };

    const state = {
      score: 0,
      best: 0,
      running: true,
      lastTime: performance.now(),
      gravity: 1320,
      nextBallScore: 5,
      message: '',
      messageTimer: 0,
      nextSeagullTime: 20 + Math.random() * 10
    };

    try {
      state.best = Number(localStorage.getItem('keepyBest') || 0);
    } catch (e) {
      state.best = 0;
    }

    const paddle = {
      x: W / 2,
      y: H * .83,
      w: 240,
      h: 6,
      velocity: 0,
      acceleration: 4300,
      maxSpeed: 1420,
      drag: .90,
      targetX: null
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function ballRadius() {
      return Math.max(30, Math.min(54, W * .045));
    }

    function sizeCanvas() {
      W = window.innerWidth || 390;
      H = window.innerHeight || 700;
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      paddle.w = Math.max(145, Math.min(270, W * .24));
      paddle.h = Math.max(5, Math.min(8, H * .007));
      paddle.y = H * .83;
      paddle.x = clamp(paddle.x || W / 2, paddle.w / 2, W - paddle.w / 2);

      for (const ball of balls) {
        ball.r = ballRadius();
        ball.x = clamp(ball.x, ball.r, W - ball.r);
      }
    }

    function createBall(x, y) {
      const direction = Math.random() > .5 ? 1 : -1;
      return {
        x: x ?? W / 2,
        y: y ?? H * .25,
        r: ballRadius(),
        vx: direction * (170 + Math.random() * 240),
        vy: 60 + Math.random() * 120,
        spin: Math.random() * Math.PI * 2,
        spinVelocity: direction * (2.2 + Math.random() * 4)
      };
    }

    function resetGame() {
      state.score = 0;
      state.running = true;
      state.nextBallScore = 5;
      state.message = '';
      state.messageTimer = 0;
      paddle.x = W / 2;
      paddle.velocity = 0;
      paddle.targetX = null;
      balls = [createBall(W / 2, H * .25)];
      hint.textContent = 'USE ARROW KEYS OR DRAG TO CONTROL THE BAR';
    }

    function addBall() {
      const x = clamp(paddle.x + (Math.random() - .5) * paddle.w, 70, W - 70);
      const y = Math.max(80, paddle.y - 220 - Math.random() * 130);
      balls.push(createBall(x, y));
      state.message = '+ BALL';
      state.messageTimer = .7;
    }

    function spawnSeagull() {
      const fromLeft = Math.random() > .5;
      const size = .55 + Math.random() * 1.25;
      const y = H * (.08 + Math.random() * .34);
      const speed = (70 + Math.random() * 130) * (fromLeft ? 1 : -1);

      seagulls.push({
        x: fromLeft ? -90 * size : W + 90 * size,
        y,
        size,
        vx: speed,
        flap: Math.random() * Math.PI * 2,
        bob: Math.random() * Math.PI * 2
      });

      state.nextSeagullTime = 20 + Math.random() * 18;
    }

    function updateSeagulls(dt) {
      state.nextSeagullTime -= dt;
      if (state.nextSeagullTime <= 0) spawnSeagull();

      for (const gull of seagulls) {
        gull.x += gull.vx * dt;
        gull.flap += dt * 7;
        gull.bob += dt * 2;
      }

      seagulls = seagulls.filter(gull => gull.x > -160 * gull.size && gull.x < W + 160 * gull.size);
    }

    function scorePoint() {
      state.score += 1;
      if (state.score > state.best) {
        state.best = state.score;
        try { localStorage.setItem('keepyBest', state.best); } catch (e) {}
      }
      while (state.score >= state.nextBallScore) {
        addBall();
        state.nextBallScore += 5;
      }
    }

    function updatePaddle(dt) {
      if (paddle.targetX !== null) {
        const desiredVelocity = (paddle.targetX - paddle.x) * 14;
        paddle.velocity += (desiredVelocity - paddle.velocity) * Math.min(1, dt * 10);
      } else {
        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        if (dir !== 0) paddle.velocity += dir * paddle.acceleration * dt;
        else paddle.velocity *= Math.pow(paddle.drag, dt * 60);
      }

      paddle.velocity = clamp(paddle.velocity, -paddle.maxSpeed, paddle.maxSpeed);
      paddle.x += paddle.velocity * dt;

      if (paddle.x < paddle.w / 2) {
        paddle.x = paddle.w / 2;
        paddle.velocity *= -0.2;
      }
      if (paddle.x > W - paddle.w / 2) {
        paddle.x = W - paddle.w / 2;
        paddle.velocity *= -0.2;
      }
    }

    function updateBall(ball, dt) {
      ball.vy += state.gravity * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.spin += ball.spinVelocity * dt;

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx) * .92;
      }
      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx) * .92;
      }
      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy) * .72;
      }

      const paddleTop = paddle.y - paddle.h / 2;
      const paddleLeft = paddle.x - paddle.w / 2;
      const paddleRight = paddle.x + paddle.w / 2;
      const ballBottom = ball.y + ball.r;

      const movingDown = ball.vy > 0;
      const crossingBar = ballBottom >= paddleTop && ballBottom <= paddleTop + 34;
      const touchingBar = ball.x >= paddleLeft - ball.r * .25 && ball.x <= paddleRight + ball.r * .25;

      if (movingDown && crossingBar && touchingBar) {
        const hitPosition = (ball.x - paddle.x) / (paddle.w / 2);
        const randomBounce = 760 + Math.random() * 520;
        const carryBounce = Math.abs(ball.vy) * (.78 + Math.random() * .28);

        ball.y = paddleTop - ball.r;
        ball.vy = -Math.max(randomBounce, carryBounce);
        ball.vx += hitPosition * (320 + Math.random() * 320) + paddle.velocity * .48;
        ball.vx = clamp(ball.vx, -900, 900);
        ball.spinVelocity = ball.vx * (.012 + Math.random() * .02);
        scorePoint();
      }
    }

    function update(dt) {
      updateSeagulls(dt);
      if (!state.running) return;

      updatePaddle(dt);
      for (const ball of balls) updateBall(ball, dt);
      balls = balls.filter(ball => ball.y - ball.r <= H);

      if (balls.length === 0) {
        state.running = false;
        state.message = 'GAME OVER';
        hint.textContent = 'TAP OR SPACE TO RESTART';
      }

      if (state.messageTimer > 0) {
        state.messageTimer -= dt;
        if (state.messageTimer <= 0 && state.message === '+ BALL') state.message = '';
      }
    }

    function drawScore() {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(65,184,188,.22)';
      ctx.font = `900 ${Math.min(W * .24, H * .20)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(String(state.score).padStart(3, '0'), W / 2, H * .48);
      ctx.font = `900 ${Math.min(W * .055, 34)}px Impact, Arial Black, sans-serif`;
      ctx.fillText('BEST ' + String(state.best).padStart(3, '0'), W / 2, H * .59);
      ctx.restore();
    }

    function drawBeachBall(ball) {
      const x = ball.x, y = ball.y, r = ball.r;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ball.spin);

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();

      const panels = [
        ['#f6c21f', -Math.PI * .95, -Math.PI * .28],
        ['#f7f9fb', -Math.PI * .28, Math.PI * .18],
        ['#d13b3f', Math.PI * .18, Math.PI * .82],
        ['#dfe7ed', Math.PI * .82, Math.PI * 1.35],
        ['#159bd4', Math.PI * 1.35, Math.PI * 1.75]
      ];

      for (const [color, start, end] of panels) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -r * .72);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fill();
      }

      const shine = ctx.createRadialGradient(-r * .35, -r * .45, r * .05, 0, 0, r);
      shine.addColorStop(0, 'rgba(255,255,255,.65)');
      shine.addColorStop(.45, 'rgba(255,255,255,.12)');
      shine.addColorStop(1, 'rgba(0,0,0,.12)');
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f7f7f7';
      ctx.beginPath();
      ctx.arc(0, -r * .72, r * .13, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSeagull(gull) {
      const wingLift = Math.sin(gull.flap) * 9 * gull.size;
      const bobY = Math.sin(gull.bob) * 4 * gull.size;
      const facing = gull.vx > 0 ? 1 : -1;

      ctx.save();
      ctx.translate(gull.x, gull.y + bobY);
      ctx.scale(facing * gull.size, gull.size);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      ctx.strokeStyle = 'rgba(30,30,30,.72)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-26, 0);
      ctx.quadraticCurveTo(-10, -18 - wingLift, 0, 0);
      ctx.quadraticCurveTo(10, -18 + wingLift, 26, 0);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,.9)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-22, -1);
      ctx.quadraticCurveTo(-9, -12 - wingLift, 0, 0);
      ctx.quadraticCurveTo(9, -12 + wingLift, 22, -1);
      ctx.stroke();

      ctx.restore();
    }

    function drawPaddle() {
      ctx.fillStyle = '#111';
      ctx.fillRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h);
    }

    function drawMessage() {
      if (!state.message) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = state.message === '+ BALL' ? 'rgba(65,184,188,.75)' : 'rgba(0,0,0,.75)';
      ctx.font = `900 ${Math.min(W * .11, 64)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(state.message, W / 2, H * .36);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawScore();
      for (const gull of seagulls) drawSeagull(gull);
      for (const ball of balls) drawBeachBall(ball);
      drawPaddle();
      drawMessage();
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      sizeCanvas();
    });

    window.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = true;
      if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = true;
      if (event.code === 'Space') {
        event.preventDefault();
        if (!state.running) resetGame();
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = false;
      if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = false;
    });

    window.addEventListener('pointerdown', (event) => {
      if (!state.running) resetGame();
      paddle.targetX = event.clientX;
    });

    window.addEventListener('pointermove', (event) => {
      paddle.targetX = event.clientX;
    });

    window.addEventListener('pointerup', () => {
      paddle.targetX = null;
    });

    window.addEventListener('pointercancel', () => {
      paddle.targetX = null;
    });

    sizeCanvas();
    resetGame();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
