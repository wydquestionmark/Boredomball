<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Keepy Uppy</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #73c7ca;
      font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
      touch-action: none;
      user-select: none;
    }
    #game {
      width: 100vw;
      height: 100dvh;
      display: block;
      background: #fff;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      color: rgba(65, 184, 188, .72);
      font: 900 18px Impact, Haettenschweiler, 'Arial Black', sans-serif;
      letter-spacing: .06em;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">USE ARROW KEYS OR DRAG TO CONTROL THE BAR</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    let W = 0, H = 0, dpr = 1;
    const keys = { left: false, right: false };
    let balls = [];

    const state = {
      score: 0,
      best: Number(localStorage.getItem('keepyBest') || 0),
      running: true,
      lastTime: 0,
      message: '',
      gravity: 1320,
      nextExtraBallAt: 5,
    };

    const paddle = {
      x: 0,
      y: 0,
      w: 244,
      h: 6,
      speed: 1120,
      vx: 0,
      momentum: 0,
      friction: 0.92,
      targetX: null,
    };

    function resize() {
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      paddle.w = Math.max(150, Math.min(260, W * 0.24));
      paddle.h = Math.max(5, Math.min(8, H * 0.007));
      paddle.y = H * 0.83;
      if (!paddle.x) paddle.x = W / 2;
      if (!balls.length) resetGame();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function makeBall(x = W / 2, y = H * 0.25) {
      const r = Math.max(30, Math.min(54, W * 0.045));
      const direction = Math.random() > 0.5 ? 1 : -1;
      return {
        x,
        y,
        vx: direction * (130 + Math.random() * 220),
        vy: -260 + Math.random() * 260,
        r,
        spin: Math.random() * Math.PI * 2,
        spinSpeed: direction * (2 + Math.random() * 4),
      };
    }

    function addExtraBall() {
      const spawnX = clamp(paddle.x + (Math.random() - 0.5) * paddle.w, 70, W - 70);
      const spawnY = Math.max(80, paddle.y - 180 - Math.random() * 120);
      balls.push(makeBall(spawnX, spawnY));
      state.message = '+ BALL';
      setTimeout(() => {
        if (state.message === '+ BALL') state.message = '';
      }, 650);
    }

    function resetGame() {
      state.score = 0;
      state.running = true;
      state.message = '';
      state.nextExtraBallAt = 5;
      paddle.x = W / 2;
      paddle.vx = 0;
      paddle.momentum = 0;
      paddle.targetX = null;
      balls = [makeBall(W / 2, H * 0.25)];
      hint.textContent = 'USE ARROW KEYS OR DRAG TO CONTROL THE BAR';
    }

    function updatePaddle(dt) {
      let oldX = paddle.x;

      if (paddle.targetX !== null) {
        const desired = (paddle.targetX - paddle.x) * 13;
        paddle.momentum += (desired - paddle.momentum) * Math.min(1, dt * 9);
      } else {
        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        const accel = dir * paddle.speed * 3.4;
        paddle.momentum += accel * dt;

        if (dir === 0) {
          paddle.momentum *= Math.pow(paddle.friction, dt * 60);
        }
      }

      paddle.momentum = clamp(paddle.momentum, -1280, 1280);
      paddle.x += paddle.momentum * dt;

      if (paddle.x < paddle.w / 2) {
        paddle.x = paddle.w / 2;
        paddle.momentum *= -0.18;
      }
      if (paddle.x > W - paddle.w / 2) {
        paddle.x = W - paddle.w / 2;
        paddle.momentum *= -0.18;
      }

      paddle.vx = (paddle.x - oldX) / Math.max(dt, 0.0001);
    }

    function scoreBounce() {
      state.score++;
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem('keepyBest', state.best);
      }
      if (state.score >= state.nextExtraBallAt) {
        addExtraBall();
        state.nextExtraBallAt += 5;
      }
    }

    function updateBall(ball, dt) {
      ball.vy += state.gravity * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.spin += ball.spinSpeed * dt;

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx) * 0.92;
      }
      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx) * 0.92;
      }
      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy) * 0.72;
      }

      const paddleTop = paddle.y - paddle.h / 2;
      const paddleLeft = paddle.x - paddle.w / 2;
      const paddleRight = paddle.x + paddle.w / 2;
      const ballBottom = ball.y + ball.r;
      const comingDown = ball.vy > 0;
      const crossesPaddle = ballBottom >= paddleTop && ballBottom <= paddleTop + 28;
      const insidePaddle = ball.x >= paddleLeft - ball.r * 0.25 && ball.x <= paddleRight + ball.r * 0.25;

      if (comingDown && crossesPaddle && insidePaddle) {
        const hit = (ball.x - paddle.x) / (paddle.w / 2);
        const randomBounce = 720 + Math.random() * 460;
        ball.y = paddleTop - ball.r;
        ball.vy = -Math.max(randomBounce, Math.abs(ball.vy) * (0.82 + Math.random() * 0.22));
        ball.vx += hit * (280 + Math.random() * 260) + paddle.vx * 0.46;
        ball.vx = clamp(ball.vx, -820, 820);
        ball.spinSpeed = ball.vx * (0.012 + Math.random() * 0.02);
        scoreBounce();
      }
    }

    function update(dt) {
      if (!state.running) return;
      updatePaddle(dt);
      for (const ball of balls) updateBall(ball, dt);

      balls = balls.filter(ball => ball.y - ball.r <= H);
      if (balls.length === 0) {
        state.running = false;
        state.message = 'GAME OVER';
        hint.textContent = 'TAP OR SPACE TO RESTART';
      }
    }

    function drawScore() {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(65, 184, 188, .22)';
      ctx.font = `900 ${Math.min(W * 0.24, H * 0.20)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(String(state.score).padStart(3, '0'), W / 2, H * 0.48);
      ctx.font = `900 ${Math.min(W * 0.055, 34)}px Impact, Arial Black, sans-serif`;
      ctx.fillText('BEST ' + String(state.best).padStart(3, '0'), W / 2, H * 0.59);
      ctx.restore();
    }

    function drawBeachBall(ball) {
      const x = ball.x, y = ball.y, r = ball.r;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ball.spin);

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();

      const panels = [
        ['#f6c21f', -Math.PI * 0.95, -Math.PI * 0.28],
        ['#f7f9fb', -Math.PI * 0.28, Math.PI * 0.18],
        ['#d13b3f', Math.PI * 0.18, Math.PI * 0.82],
        ['#dfe7ed', Math.PI * 0.82, Math.PI * 1.35],
        ['#159bd4', Math.PI * 1.35, Math.PI * 1.75],
      ];

      for (const [color, a1, a2] of panels) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.72);
        ctx.arc(0, 0, r, a1, a2);
        ctx.closePath();
        ctx.fill();
      }

      const shine = ctx.createRadialGradient(-r * .35, -r * .45, r * .05, 0, 0, r);
      shine.addColorStop(0, 'rgba(255,255,255,.65)');
      shine.addColorStop(.45, 'rgba(255,255,255,.12)');
      shine.addColorStop(1, 'rgba(0,0,0,.12)');
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f7f7f7';
      ctx.beginPath();
      ctx.arc(0, -r * 0.72, r * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawPaddle() {
      ctx.fillStyle = '#111';
      ctx.fillRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h);
    }

    function drawMessage() {
      if (!state.message) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = state.message === '+ BALL' ? 'rgba(65,184,188,.75)' : 'rgba(0,0,0,.75)';
      ctx.font = `900 ${Math.min(W * 0.11, 64)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(state.message, W / 2, H * 0.36);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawScore();
      for (const ball of balls) drawBeachBall(ball);
      drawPaddle();
      drawMessage();
    }

    function loop(time) {
      const dt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
      state.lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (!state.running) resetGame();
      }
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') key
