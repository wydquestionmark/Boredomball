<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Keepy Uppy</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      touch-action: none;
      user-select: none;
      font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100dvh;
      background: white;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: rgba(65,184,188,.75);
      font: 900 18px Impact, Haettenschweiler, 'Arial Black', sans-serif;
      letter-spacing: .06em;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">USE ARROW KEYS OR DRAG TO CONTROL THE BAR</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    let W = window.innerWidth;
    let H = window.innerHeight;
    let dpr = 1;
    let balls = [];
    let faces = [];
    let popTexts = [];
    let poops = [];

    const keys = { left: false, right: false };

    const state = {
      score: 0,
      best: 0,
      running: true,
      lastTime: performance.now(),
      gravity: 1320,
      nextBallScore: 5,
      nextFaceScore: 30,
      nextFaceSpawnTimer: 0,
      message: '',
      messageTimer: 0,
      smileStreak: 0,
      wowTimer: 0,
      wowSpin: 0,
      poopRainTriggered: false
    };

    try {
      state.best = Number(localStorage.getItem('keepyBest') || 0);
    } catch (e) {
      state.best = 0;
    }

    const paddle = {
      x: W / 2,
      y: H * .83,
      w: 240,
      h: 6,
      velocity: 0,
      acceleration: 4300,
      maxSpeed: 1420,
      drag: .90,
      targetX: null
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function ballRadius() {
      return Math.max(30, Math.min(54, W * .045));
    }

    function sizeCanvas() {
      W = window.innerWidth || 390;
      H = window.innerHeight || 700;
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      paddle.w = Math.max(145, Math.min(270, W * .24));
      paddle.h = Math.max(5, Math.min(8, H * .007));
      paddle.y = H * .83;
      paddle.x = clamp(paddle.x || W / 2, paddle.w / 2, W - paddle.w / 2);

      for (const ball of balls) {
        ball.r = ballRadius();
        ball.x = clamp(ball.x, ball.r, W - ball.r);
      }
    }

    function createBall(x, y) {
      const direction = Math.random() > .5 ? 1 : -1;
      return {
        x: x ?? W / 2,
        y: y ?? H * .25,
        r: ballRadius(),
        vx: direction * (170 + Math.random() * 240),
        vy: 60 + Math.random() * 120,
        spin: Math.random() * Math.PI * 2,
        spinVelocity: direction * (2.2 + Math.random() * 4),
        lastRampId: null
      };
    }

    function createFace() {
      const size = 38 + Math.random() * 70;
      const x = 90 + Math.random() * Math.max(1, W - 180);
      const scoreboardZone = H * .60;
      const y = 90 + Math.random() * Math.max(80, scoreboardZone - 180);

      faces.push({
        id: Math.random().toString(36).slice(2),
        x,
        y,
        baseX: x,
        baseY: y,
        size,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() > .5 ? 1 : -1) * (.45 + Math.random() * 1.1),
        driftX: (Math.random() > .5 ? 1 : -1) * (55 + Math.random() * 95),
        driftY: (Math.random() > .5 ? 1 : -1) * (32 + Math.random() * 68),
        speedX: .8 + Math.random() * .9,
        speedY: .7 + Math.random() * .8,
        pulse: Math.random() * Math.PI * 2,
        lit: 0,
        alpha: 1,
        fading: false
      });
    }

    function resetGame() {
      state.score = 0;
      state.running = true;
      state.nextBallScore = 5;
      state.nextFaceScore = 30;
      state.nextFaceSpawnTimer = 0;
      state.message = '';
      state.messageTimer = 0;
      state.smileStreak = 0;
      state.wowTimer = 0;
      state.wowSpin = 0;
      state.poopRainTriggered = false;
      popTexts = [];
      paddle.x = W / 2;
      paddle.velocity = 0;
      paddle.targetX = null;
      balls = [createBall(W / 2, H * .25)];
      faces = [];
      hint.textContent = 'USE ARROW KEYS OR DRAG TO CONTROL THE BAR';
    }

    function addBall() {
      const x = clamp(paddle.x + (Math.random() - .5) * paddle.w, 70, W - 70);
      const y = Math.max(80, paddle.y - 220 - Math.random() * 130);
      balls.push(createBall(x, y));
      state.message = '+ BALL';
      state.messageTimer = .7;
    }

    function scorePoint() {
      state.score += 1;

      if (state.score === 25) {
        state.wowTimer = 2.1;
        state.wowSpin = Math.PI * 5;
      }

      if (state.score >= 35 && !state.poopRainTriggered) {
        state.poopRainTriggered = true;
        for (let i = 0; i < 22; i++) {
          poops.push({
            x: Math.random() * W,
            y: -Math.random() * 600,
            vy: 180 + Math.random() * 340,
            size: 18 + Math.random() * 24,
            landed: false,
            alpha: 1,
            wobble: Math.random() * Math.PI * 2
          });
        }
      }
      if (state.score > state.best) {
        state.best = state.score;
        try { localStorage.setItem('keepyBest', state.best); } catch (e) {}
      }
      while (state.score >= state.nextBallScore) {
        addBall();
        state.nextBallScore += 5;
      }
      if (state.score >= state.nextFaceScore) {
        state.nextFaceSpawnTimer = 0;
        state.nextFaceScore += 3;
      }
    }

    function updatePaddle(dt) {
      if (paddle.targetX !== null) {
        const desiredVelocity = (paddle.targetX - paddle.x) * 14;
        paddle.velocity += (desiredVelocity - paddle.velocity) * Math.min(1, dt * 10);
      } else {
        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        if (dir !== 0) paddle.velocity += dir * paddle.acceleration * dt;
        else paddle.velocity *= Math.pow(paddle.drag, dt * 60);
      }

      paddle.velocity = clamp(paddle.velocity, -paddle.maxSpeed, paddle.maxSpeed);
      paddle.x += paddle.velocity * dt;

      if (paddle.x < paddle.w / 2) {
        paddle.x = paddle.w / 2;
        paddle.velocity *= -0.2;
      }
      if (paddle.x > W - paddle.w / 2) {
        paddle.x = W - paddle.w / 2;
        paddle.velocity *= -0.2;
      }
    }

    function updateFaces(dt) {
      if (state.score >= 30 && faces.length < 1) {
        state.nextFaceSpawnTimer -= dt;
        if (state.nextFaceSpawnTimer <= 0) {
          createFace();
          state.nextFaceSpawnTimer = 1.2 + Math.random() * 1.8;
        }
      }

      for (const face of faces) {
        face.pulse += dt;
        face.x = face.baseX + Math.sin(face.pulse * face.speedX) * face.driftX;
        face.y = face.baseY + Math.cos(face.pulse * face.speedY) * face.driftY;
        face.rotation += face.rotationSpeed * dt;

        if (face.fading) {
          face.lit += (1 - face.lit) * dt * 8;
          face.alpha -= dt * .55;
        }
      }

      faces = faces.filter(face => face.alpha > 0);

      
    }

    function hitFace(face) {
      face.lit = 1;
      face.fading = true;

      state.score += 1;
      state.smileStreak += 1;

      if (state.score > state.best) {
        state.best = state.score;
        try { localStorage.setItem('keepyBest', state.best); } catch (e) {}
      }

      popTexts.push({
        text: 'Pop!',
        x: face.x,
        y: face.y,
        vy: -42,
        life: 0.7,
        alpha: 1
      });

      if (state.smileStreak >= 3) {
        state.wowTimer = 1.25;
        state.smileStreak = 0;
      }
    }

    function bounceOnFace(ball, face) {
      const dx = ball.x - face.x;
      const dy = ball.y - face.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const radius = face.size + ball.r;

      if (distance >= radius || face.fading) return;

      hitFace(face);
    }

    function bounceOnRamp(ball, ramp) {
      const cos = Math.cos(ramp.angle);
      const sin = Math.sin(ramp.angle);
      const dx = ball.x - ramp.x;
      const dy = ball.y - ramp.y;
      const localX = dx * cos + dy * sin;
      const localY = -dx * sin + dy * cos;
      const half = ramp.length / 2;

      const onTop = localX > -half - ball.r * .25 && localX < half + ball.r * .25;
      const closeToSurface = localY + ball.r > -6 && localY + ball.r < 24;
      const movingIntoRamp = ball.vy > -80;

      if (!onTop || !closeToSurface || !movingIntoRamp || ball.lastRampId === ramp.id) return;

      const normalX = -sin;
      const normalY = -cos;
      const dot = ball.vx * normalX + ball.vy * normalY;

      if (dot < 0) {
        ball.vx -= 1.65 * dot * normalX;
        ball.vy -= 1.65 * dot * normalY;
      }

      ball.vx += Math.sin(ramp.angle) * 360;
      ball.vy -= 180 + Math.random() * 120;
      ball.vx = clamp(ball.vx, -950, 950);
      ball.y -= 8;
      ball.spinVelocity = ball.vx * .025;
      ball.lastRampId = ramp.id;
      setTimeout(() => {
        if (ball.lastRampId === ramp.id) ball.lastRampId = null;
      }, 220);
    }

    function updateBall(ball, dt) {
      ball.vy += state.gravity * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.spin += ball.spinVelocity * dt;

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx) * .92;
      }
      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx) * .92;
      }
      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy) * .72;
      }

      for (const face of faces) bounceOnFace(ball, face);

      const paddleTop = paddle.y - paddle.h / 2;
      const paddleLeft = paddle.x - paddle.w / 2;
      const paddleRight = paddle.x + paddle.w / 2;
      const ballBottom = ball.y + ball.r;

      const movingDown = ball.vy > 0;
      const crossingBar = ballBottom >= paddleTop && ballBottom <= paddleTop + 34;
      const touchingBar = ball.x >= paddleLeft - ball.r * .25 && ball.x <= paddleRight + ball.r * .25;

      if (movingDown && crossingBar && touchingBar) {
        const hitPosition = (ball.x - paddle.x) / (paddle.w / 2);
        const randomBounce = 760 + Math.random() * 520;
        const carryBounce = Math.abs(ball.vy) * (.78 + Math.random() * .28);

        ball.y = paddleTop - ball.r;
        ball.vy = -Math.max(randomBounce, carryBounce);
        ball.vx += hitPosition * (320 + Math.random() * 320) + paddle.velocity * .48;
        ball.vx = clamp(ball.vx, -900, 900);
        ball.spinVelocity = ball.vx * (.012 + Math.random() * .02);
        state.smileStreak = 0;
        scorePoint();
      }
    }

    function update(dt) {
      if (!state.running) return;

      updatePaddle(dt);
      updateFaces(dt);
      for (const ball of balls) updateBall(ball, dt);
      balls = balls.filter(ball => ball.y - ball.r <= H);

      if (balls.length === 0) {
        state.running = false;
        state.message = 'GAME OVER';
        hint.textContent = 'TAP OR SPACE TO RESTART';
      }

      if (state.messageTimer > 0) {
        state.messageTimer -= dt;
        if (state.messageTimer <= 0) state.message = '';
      }

      if (state.wowTimer > 0) {
        state.wowTimer -= dt;
        state.wowSpin *= 0.965;
      }

      for (const poop of poops) {
        if (!poop.landed) {
          poop.y += poop.vy * dt;
          poop.x += Math.sin(performance.now() * 0.002 + poop.wobble) * 0.8;

          const paddleTop = paddle.y - paddle.h / 2;
          const touchingBar = poop.y + poop.size * .45 >= paddleTop && poop.x > paddle.x - paddle.w / 2 && poop.x < paddle.x + paddle.w / 2;

          if (touchingBar) {
            poop.landed = true;
            poop.y = paddleTop - poop.size * .18;
          }
        } else {
          poop.alpha -= dt * 0.22;
        }
      }

      poops = poops.filter(poop => poop.alpha > 0);

      for (const pop of popTexts) {
        pop.life -= dt;
        pop.y += pop.vy * dt;
        pop.alpha = Math.max(0, pop.life / 0.7);
      }
      popTexts = popTexts.filter(pop => pop.life > 0);
    }

    function drawScore() {
      const hue = (state.score * 7) % 360;
      const mainColor = `hsla(${hue}, 78%, 52%, .34)`;
      const bestColor = `hsla(${(hue + 35) % 360}, 78%, 45%, .42)`;

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = mainColor;
      ctx.font = `900 ${Math.min(W * .24, H * .20)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(String(state.score).padStart(3, '0'), W / 2, H * .48);

      ctx.font = `900 ${Math.min(W * .055, 34)}px Impact, Arial Black, sans-serif`;
      ctx.fillStyle = bestColor;
      ctx.fillText('BEST ' + String(state.best).padStart(3, '0'), W / 2, H * .59);
      ctx.restore();
    }

    function drawBeachBall(ball) {
      const x = ball.x, y = ball.y, r = ball.r;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ball.spin);

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();

      const panels = [
        ['#f6c21f', -Math.PI * .95, -Math.PI * .28],
        ['#f7f9fb', -Math.PI * .28, Math.PI * .18],
        ['#d13b3f', Math.PI * .18, Math.PI * .82],
        ['#dfe7ed', Math.PI * .82, Math.PI * 1.35],
        ['#159bd4', Math.PI * 1.35, Math.PI * 1.75]
      ];

      for (const [color, start, end] of panels) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -r * .72);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fill();
      }

      const shine = ctx.createRadialGradient(-r * .35, -r * .45, r * .05, 0, 0, r);
      shine.addColorStop(0, 'rgba(255,255,255,.65)');
      shine.addColorStop(.45, 'rgba(255,255,255,.12)');
      shine.addColorStop(1, 'rgba(0,0,0,.12)');
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f7f7f7';
      ctx.beginPath();
      ctx.arc(0, -r * .72, r * .13, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawFace(face) {
      const glow = face.lit;
      const color = glow > 0.02
        ? `rgb(${Math.floor(140 + glow * 115)}, ${Math.floor(120 + glow * 95)}, 0)`
        : 'rgb(137,117,40)';

      ctx.save();
      ctx.globalAlpha = face.alpha;
      ctx.translate(face.x, face.y);
      ctx.rotate(face.rotation);

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, face.size, 0, Math.PI * 2);
      ctx.fill();

      // eyes
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(-face.size * .30, -face.size * .22, face.size * .08, face.size * .22, 0, 0, Math.PI * 2);
      ctx.ellipse(face.size * .30, -face.size * .22, face.size * .08, face.size * .22, 0, 0, Math.PI * 2);
      ctx.fill();

      if (glow > 0.02) {
        ctx.beginPath();
        ctx.arc(0, face.size * .12, face.size * .52, 0, Math.PI, false);
        ctx.lineTo(face.size * .52, face.size * .12);
        ctx.fill();
      } else {
        ctx.lineWidth = Math.max(4, face.size * .08);
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-face.size * .42, face.size * .34);
        ctx.lineTo(face.size * .42, face.size * .34);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPaddle() {
      ctx.fillStyle = '#111';
      ctx.fillRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h);
    }

    function drawPopTexts() {
      for (const pop of popTexts) {
        ctx.save();
        ctx.globalAlpha = pop.alpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(65,184,188,.95)';
        ctx.font = `900 ${Math.min(W * .065, 42)}px Impact, Arial Black, sans-serif`;
        ctx.fillText(pop.text, pop.x, pop.y);
        ctx.restore();
      }
    }

    function drawWow() {
      if (state.wowTimer <= 0) return;

      const alpha = Math

    function drawMessage() {
      if (!state.message) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = state.message === '+ BALL' ? 'rgba(65,184,188,.75)' : 'rgba(0,0,0,.75)';
      ctx.font = `900 ${Math.min(W * .11, 64)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(state.message, W / 2, H * .36);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawScore();
      for (const face of faces) drawFace(face);
      for (const ball of balls) drawBeachBall(ball);
      drawPaddle();
      drawPopTexts();
      drawWow();
      drawMessage();
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => sizeCanvas());

    window.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = true;
      if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = true;
      if (event.code === 'Space') {
        event.preventDefault();
        if (!state.running) resetGame();
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.code === 'ArrowLeft' || event.code === 'KeyA') keys.left = false;
      if (event.code === 'ArrowRight' || event.code === 'KeyD') keys.right = false;
    });

    window.addEventListener('pointerdown', (event) => {
      if (!state.running) resetGame();
      paddle.targetX = event.clientX;
    });

    window.addEventListener('pointermove', (event) => {
      paddle.targetX = event.clientX;
    });

    window.addEventListener('pointerup', () => {
      paddle.targetX = null;
    });

    window.addEventListener('pointercancel', () => {
      paddle.targetX = null;
    });

    sizeCanvas();
    resetGame();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
