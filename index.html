<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Keepy Uppy</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      touch-action: none;
      user-select: none;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100dvh;
      background: white;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: rgba(65,184,188,.75);
      font: 900 18px Impact, Haettenschweiler, "Arial Black", sans-serif;
      letter-spacing: .06em;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">USE ARROW KEYS OR DRAG TO CONTROL THE HOTDOG</div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");

    // Save these image files in the same GitHub folder as index.html:
    // troll.png
    // beachball.png
    const trollImg = new Image();
    trollImg.src = "troll.png";

    const beachBallImg = new Image();
    beachBallImg.src = "beachball.png";

    let W = window.innerWidth || 390;
    let H = window.innerHeight || 700;
    let dpr = 1;

    let balls = [];
    let faces = [];
    let popTexts = [];
    let poops = [];
    let smokePuffs = [];
    let trollHeads = [];

    const keys = { left: false, right: false };

    const state = {
      score: 0,
      best: 0,
      running: true,
      gameOver: false,
      lastTime: performance.now(),
      gravity: 1320,

      nextBallScore: 5,
      nextFaceScore: 30,
      nextFaceSpawnTimer: 0,

      smileStreak: 0,
      message: "",
      messageTimer: 0,

      streakWowTimer: 0,
      milestoneWowTimer: 0,
      milestoneWowSpin: 0,

      roundGotHighScore: false,

      did25Wow: false,
      did35Poops: false,
      did50Shrink: false,

      fireMode: false,
      infernoMode: false,

      visitorCount: 0
    };

    try {
      state.best = Number(localStorage.getItem("keepyBest") || 0);
      state.visitorCount = Number(localStorage.getItem("visitorCount") || 0) + 1;
      localStorage.setItem("visitorCount", state.visitorCount);
    } catch (e) {
      state.best = 0;
      state.visitorCount = Math.floor(1000 + Math.random() * 9000);
    }

    const paddle = {
      x: W / 2,
      y: H * .83,
      w: 240,
      h: 24,
      velocity: 0,
      acceleration: 4300,
      maxSpeed: 1420,
      drag: .90,
      targetX: null
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function baseBallRadius() {
      return Math.max(30, Math.min(54, W * .045));
    }

    function currentBallRadius() {
      // Ball starts 2x size and shrinks to normal by score 20.
      const progress = clamp(state.score / 20, 0, 1);
      const scale = 2 - progress;
      return baseBallRadius() * scale;
    }

    function sizeCanvas() {
      W = window.innerWidth || 390;
      H = window.innerHeight || 700;
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const baseWidth = Math.max(145, Math.min(270, W * .24));
      paddle.w = state.did50Shrink ? baseWidth * (2 / 3) : baseWidth;
      paddle.h = Math.max(20, Math.min(30, H * .026));
      paddle.y = H * .83;
      paddle.x = clamp(paddle.x || W / 2, paddle.w / 2, W - paddle.w / 2);

      for (const ball of balls) {
        ball.r = currentBallRadius();
        ball.x = clamp(ball.x, ball.r, W - ball.r);
      }
    }

    function createBall(x = W / 2, y = H * .25) {
      const direction = Math.random() > .5 ? 1 : -1;

      return {
        x,
        y,
        r: currentBallRadius(),
        vx: direction * (170 + Math.random() * 240),
        vy: 60 + Math.random() * 120,
        spin: Math.random() * Math.PI * 2,
        spinVelocity: direction * (2.2 + Math.random() * 4)
      };
    }

    function createFace() {
      const scoreboardZone = H * .60;
      const size = 38 + Math.random() * 70;
      const x = 90 + Math.random() * Math.max(1, W - 180);
      const y = 90 + Math.random() * Math.max(80, scoreboardZone - 180);

      faces.push({
        x, y,
        baseX: x,
        baseY: y,
        size,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() > .5 ? 1 : -1) * (.45 + Math.random() * 1.1),
        driftX: (Math.random() > .5 ? 1 : -1) * (55 + Math.random() * 95),
        driftY: (Math.random() > .5 ? 1 : -1) * (32 + Math.random() * 68),
        speedX: .8 + Math.random() * .9,
        speedY: .7 + Math.random() * .8,
        pulse: Math.random() * Math.PI * 2,
        lit: 0,
        alpha: 1,
        fading: false
      });
    }

    function resetGame() {
      state.score = 0;
      state.running = true;
      state.gameOver = false;

      state.nextBallScore = 5;
      state.nextFaceScore = 30;
      state.nextFaceSpawnTimer = 0;

      state.smileStreak = 0;
      state.message = "";
      state.messageTimer = 0;

      state.streakWowTimer = 0;
      state.milestoneWowTimer = 0;
      state.milestoneWowSpin = 0;

      state.roundGotHighScore = false;

      state.did25Wow = false;
      state.did35Poops = false;
      state.did50Shrink = false;

      state.fireMode = false;
      state.infernoMode = false;

      paddle.x = W / 2;
      paddle.velocity = 0;
      paddle.targetX = null;

      balls = [createBall(W / 2, H * .25)];
      faces = [];
      popTexts = [];
      poops = [];
      smokePuffs = [];
      trollHeads = [];

      sizeCanvas();
      hint.textContent = "USE ARROW KEYS OR DRAG TO CONTROL THE HOTDOG";
    }

    function addBall() {
      const x = clamp(paddle.x + (Math.random() - .5) * paddle.w, 70, W - 70);
      const y = Math.max(80, paddle.y - 220 - Math.random() * 130);

      balls.push(createBall(x, y));

      state.message = "+ BALL";
      state.messageTimer = .7;
    }

    function trigger25Wow() {
      state.did25Wow = true;
      state.milestoneWowTimer = 2.2;
      state.milestoneWowSpin = Math.PI * 5.5;
    }

    function triggerPoopRain() {
      state.did35Poops = true;

      for (let i = 0; i < 24; i++) {
        poops.push({
          x: Math.random() * W,
          y: -40 - Math.random() * 620,
          vy: 190 + Math.random() * 360,
          size: 17 + Math.random() * 23,
          alpha: 1,
          landed: false,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }

    function spawnTrollFlood() {
      for (let i = 0; i < 55; i++) {
        const size = 22 + Math.random() * 42;

        trollHeads.push({
          x: Math.random() * W,
          y: -size - Math.random() * 1300,
          vx: (Math.random() - .5) * 140,
          vy: 190 + Math.random() * 460,
          size,
          rotation: (Math.random() - .5) * 1.6,
          rotationSpeed: (Math.random() - .5) * 3.2,
          alpha: 1,
          delay: Math.random() * 1.4,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }

    function checkMilestones() {
      if (state.score >= 25 && !state.did25Wow) trigger25Wow();
      if (state.score >= 35 && !state.did35Poops) triggerPoopRain();

      if (state.score >= 50 && !state.did50Shrink) {
        state.did50Shrink = true;
        state.fireMode = true;
        paddle.w *= 2 / 3;
        state.message = "FIRE MODE";
        state.messageTimer = 1.2;
      }

      if (state.score >= 60 && !state.infernoMode) {
        state.infernoMode = true;
        state.message = "INFERNO";
        state.messageTimer = 1.4;
      }
    }

    function addScore(amount = 1) {
      state.score += amount;

      for (const ball of balls) {
        ball.r = currentBallRadius();
      }

      if (state.score > state.best) {
        state.best = state.score;
        state.roundGotHighScore = true;
        try { localStorage.setItem("keepyBest", state.best); } catch (e) {}
      }

      while (state.score >= state.nextBallScore) {
        addBall();
        state.nextBallScore += 5;
      }

      if (state.score >= state.nextFaceScore) {
        state.nextFaceSpawnTimer = 0;
        state.nextFaceScore += 3;
      }

      checkMilestones();
    }

    function updatePaddle(dt) {
      if (paddle.targetX !== null) {
        const desiredVelocity = (paddle.targetX - paddle.x) * 14;
        paddle.velocity += (desiredVelocity - paddle.velocity) * Math.min(1, dt * 10);
      } else {
        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        if (dir !== 0) paddle.velocity += dir * paddle.acceleration * dt;
        else paddle.velocity *= Math.pow(paddle.drag, dt * 60);
      }

      paddle.velocity = clamp(paddle.velocity, -paddle.maxSpeed, paddle.maxSpeed);
      paddle.x += paddle.velocity * dt;

      if (paddle.x < paddle.w / 2) {
        paddle.x = paddle.w / 2;
        paddle.velocity *= -0.2;
      }

      if (paddle.x > W - paddle.w / 2) {
        paddle.x = W - paddle.w / 2;
        paddle.velocity *= -0.2;
      }
    }

    function updateFaces(dt) {
      if (state.score >= 30 && faces.length < 1 && state.running) {
        state.nextFaceSpawnTimer -= dt;

        if (state.nextFaceSpawnTimer <= 0) {
          createFace();
          state.nextFaceSpawnTimer = 1.2 + Math.random() * 1.8;
        }
      }

      for (const face of faces) {
        face.pulse += dt;
        face.x = face.baseX + Math.sin(face.pulse * face.speedX) * face.driftX;
        face.y = face.baseY + Math.cos(face.pulse * face.speedY) * face.driftY;
        face.rotation += face.rotationSpeed * dt;

        if (face.fading) {
          face.lit += (1 - face.lit) * dt * 8;
          face.alpha -= dt * .55;
        }
      }

      faces = faces.filter(face => face.alpha > 0);
    }

    function updateSmoke(dt) {
      if (state.fireMode && state.running) {
        for (const ball of balls) {
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

          if (speed > 80) {
            const angle = Math.atan2(ball.vy, ball.vx) + Math.PI;
            const count = state.infernoMode ? 3 : 1;

            for (let i = 0; i < count; i++) {
              smokePuffs.push({
                x: ball.x + Math.cos(angle) * ball.r * .8 + (Math.random() - .5) * ball.r * .5,
                y: ball.y + Math.sin(angle) * ball.r * .8 + (Math.random() - .5) * ball.r * .5,
                vx: Math.cos(angle) * (20 + Math.random() * 60) + (Math.random() - .5) * 24,
                vy: Math.sin(angle) * (20 + Math.random() * 60) - 18 - Math.random() * 18,
                r: ball.r * (.22 + Math.random() * .26),
                life: .75 + Math.random() * .45,
                maxLife: 1.2,
                alpha: state.infernoMode ? .38 + Math.random() * .28 : .26 + Math.random() * .22,
                ember: state.infernoMode && Math.random() > .55
              });
            }
          }
        }
      }

      for (const puff of smokePuffs) {
        puff.life -= dt;
        puff.x += puff.vx * dt;
        puff.y += puff.vy * dt;
        puff.vx *= Math.pow(.985, dt * 60);
        puff.vy += puff.ember ? 80 * dt : -6 * dt;
        puff.r += puff.ember ? 4 * dt : 12 * dt;
      }

      smokePuffs = smokePuffs.filter(puff => puff.life > 0);
    }

    function updatePoops(dt) {
      for (const poop of poops) {
        if (!poop.landed) {
          poop.y += poop.vy * dt;
          poop.x += Math.sin(performance.now() * .002 + poop.wobble) * .8;

          const paddleTop = paddle.y - paddle.h / 2;
          const hitsBar = poop.y + poop.size * .45 >= paddleTop &&
            poop.x > paddle.x - paddle.w / 2 &&
            poop.x < paddle.x + paddle.w / 2;

          if (hitsBar) {
            poop.landed = true;
            poop.y = paddleTop - poop.size * .18;
          }
        } else {
          poop.alpha -= dt * .22;
        }
      }

      poops = poops.filter(poop => poop.alpha > 0 && poop.y < H + 80);
    }

    function updateTrollHeads(dt) {
      for (const head of trollHeads) {
        if (head.delay > 0) {
          head.delay -= dt;
          continue;
        }

        head.wobble += dt * 2.2;
        head.x += (head.vx + Math.sin(head.wobble) * 18) * dt;
        head.y += head.vy * dt;
        head.vy += 95 * dt;
        head.rotation += head.rotationSpeed * dt;

        if (head.y > H * .72) head.alpha -= dt * .45;
      }

      trollHeads = trollHeads.filter(head => head.alpha > 0 && head.y < H + 240);
    }

    function hitFace(face) {
      if (face.fading) return;

      face.lit = 1;
      face.fading = true;

      state.smileStreak += 1;
      addScore(1);

      popTexts.push({
        text: "Pop!",
        x: face.x,
        y: face.y,
        vy: -42,
        life: .7,
        alpha: 1
      });

      if (state.smileStreak >= 3) {
        state.streakWowTimer = 1.25;
        state.smileStreak = 0;
      }
    }

    function touchFace(ball, face) {
      const dx = ball.x - face.x;
      const dy = ball.y - face.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < face.size + ball.r) hitFace(face);
    }

    function updateBall(ball, dt) {
      ball.vy += state.gravity * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.spin += ball.spinVelocity * dt;

      ball.r += (currentBallRadius() - ball.r) * Math.min(1, dt * 4);

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx) * .92;
      }

      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx) * .92;
      }

      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy) * .72;
      }

      for (const face of faces) touchFace(ball, face);

      const paddleTop = paddle.y - paddle.h / 2;
      const paddleLeft = paddle.x - paddle.w / 2;
      const paddleRight = paddle.x + paddle.w / 2;
      const ballBottom = ball.y + ball.r;

      const movingDown = ball.vy > 0;
      const crossingHotdog = ballBottom >= paddleTop && ballBottom <= paddleTop + 42;
      const touchingHotdog = ball.x >= paddleLeft - ball.r * .25 && ball.x <= paddleRight + ball.r * .25;

      if (movingDown && crossingHotdog && touchingHotdog) {
        const hitPosition = (ball.x - paddle.x) / (paddle.w / 2);
        const randomBounce = 760 + Math.random() * 520;
        const carryBounce = Math.abs(ball.vy) * (.78 + Math.random() * .28);

        ball.y = paddleTop - ball.r;
        ball.vy = -Math.max(randomBounce, carryBounce);
        ball.vx += hitPosition * (320 + Math.random() * 320) + paddle.velocity * .48;
        ball.vx = clamp(ball.vx, -900, 900);
        ball.spinVelocity = ball.vx * (.012 + Math.random() * .02);

        state.smileStreak = 0;
        addScore(1);
      }
    }

    function triggerGameOver() {
      if (state.gameOver) return;

      state.gameOver = true;
      state.running = false;
      state.message = state.roundGotHighScore ? "HIGH SCORE!!!" : "GAME OVER";
      hint.textContent = "TAP OR SPACE TO RESTART";

      spawnTrollFlood();
    }

    function update(dt) {
      updatePoops(dt);
      updateTrollHeads(dt);
      updateSmoke(dt);

      if (state.running) {
        updatePaddle(dt);
        updateFaces(dt);

        for (const ball of balls) updateBall(ball, dt);

        balls = balls.filter(ball => ball.y - ball.r <= H);

        if (balls.length === 0) triggerGameOver();
      }

      if (state.messageTimer > 0) {
        state.messageTimer -= dt;
        if (state.messageTimer <= 0) state.message = "";
      }

      if (state.streakWowTimer > 0) state.streakWowTimer -= dt;

      if (state.milestoneWowTimer > 0) {
        state.milestoneWowTimer -= dt;
        state.milestoneWowSpin *= .965;
      }

      for (const pop of popTexts) {
        pop.life -= dt;
        pop.y += pop.vy * dt;
        pop.alpha = Math.max(0, pop.life / .7);
      }

      popTexts = popTexts.filter(pop => pop.life > 0);
    }

    function drawBackgroundTroll() {
      if (!(trollImg.complete && trollImg.naturalWidth > 0)) return;

      const width = W * 1.1;
      const height = width * 0.74;

      ctx.save();
      ctx.globalAlpha = 0.05;
      ctx.translate(W / 2, H * .45);
      ctx.drawImage(trollImg, -width / 2, -height / 2, width, height);
      ctx.restore();
    }

    function drawVisitorCounter() {
      const text = String(state.visitorCount).padStart(6, "0");
      const x = W - 14;
      const y = 14;

      ctx.save();

      ctx.textAlign = "right";
      ctx.textBaseline = "top";
      ctx.font = "bold 16px monospace";

      const boxW = 92;
      const boxH = 25;

      ctx.fillStyle = "#111";
      ctx.fillRect(x - boxW, y, boxW, boxH);

      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 2;
      ctx.strokeRect(x - boxW, y, boxW, boxH);

      ctx.fillStyle = "#9cff7c";
      ctx.fillText(text, x - 8, y + 4);

      ctx.font = "8px monospace";
      ctx.fillStyle = "#555";
      ctx.textAlign = "center";
      ctx.fillText("VISITS", x - boxW / 2, y + boxH + 3);

      ctx.restore();
    }

    function drawScore() {
      const hue = (state.score * 7) % 360;
      const mainColor = `hsla(${hue}, 78%, 52%, .34)`;
      const bestColor = `hsla(${(hue + 35) % 360}, 78%, 45%, .42)`;

      ctx.save();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillStyle = mainColor;
      ctx.font = `900 ${Math.min(W * .34, H * .28)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(String(state.score).padStart(3, "0"), W / 2, H * .47);

      ctx.font = `900 ${Math.min(W * .075, 46)}px Impact, Arial Black, sans-serif`;
      ctx.fillStyle = bestColor;
      ctx.fillText("BEST " + String(state.best).padStart(3, "0"), W / 2, H * .64);

      ctx.restore();
    }

    function drawBeachBall(ball) {
      const size = ball.r * 2;

      ctx.save();

      ctx.translate(ball.x, ball.y);
      ctx.rotate(ball.spin);

      if (beachBallImg.complete && beachBallImg.naturalWidth > 0) {
        ctx.drawImage(beachBallImg, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = "#ddd";
        ctx.beginPath();
        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSmoke() {
      for (const puff of smokePuffs) {
        const alpha = puff.alpha * Math.max(0, puff.life / puff.maxLife);

        ctx.save();
        ctx.globalAlpha = alpha;

        const grad = ctx.createRadialGradient(puff.x, puff.y, 1, puff.x, puff.y, puff.r);

        if (puff.ember) {
          grad.addColorStop(0, "rgba(255,220,120,.95)");
          grad.addColorStop(.35, "rgba(255,120,0,.75)");
          grad.addColorStop(.75, "rgba(180,20,0,.18)");
          grad.addColorStop(1, "rgba(0,0,0,0)");
        } else {
          grad.addColorStop(0, "rgba(65,65,65,.55)");
          grad.addColorStop(.55, "rgba(95,95,95,.22)");
          grad.addColorStop(1, "rgba(120,120,120,0)");
        }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(puff.x, puff.y, puff.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function drawFireball(ball) {
      drawBeachBall(ball);

      const time = performance.now() * .006;
      const pulse = state.infernoMode
        ? 1 + Math.sin(time * 4.2) * .22
        : .75 + Math.sin(time * 2.3) * .12;

      ctx.save();

      ctx.translate(ball.x, ball.y);
      ctx.globalCompositeOperation = "lighter";

      if (state.infernoMode) {
        ctx.shadowBlur = ball.r * 1.4;
        ctx.shadowColor = "rgba(255,80,0,.95)";
      }

      const glow = ctx.createRadialGradient(0, 0, ball.r * .72, 0, 0, ball.r * 1.35 * pulse);
      glow.addColorStop(0, "rgba(255,120,0,0)");
      glow.addColorStop(.55, "rgba(255,145,0,.16)");
      glow.addColorStop(.78, "rgba(255,60,0,.48)");
      glow.addColorStop(1, "rgba(255,0,0,0)");

      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, ball.r * 1.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = Math.max(3, ball.r * .11);
      ctx.strokeStyle = "rgba(255,170,30,.82)";
      ctx.beginPath();

      for (let i = 0; i <= 40; i++) {
        const a = (i / 40) * Math.PI * 2;
        const wobble = Math.sin(a * 7 + time * 4) * ball.r * .035;
        const rr = ball.r * 1.05 + wobble;
        const px = Math.cos(a) * rr;
        const py = Math.sin(a) * rr;

        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }

      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }

    function drawFace(face) {
      const glow = face.lit;
      const color = glow > .02
        ? `rgb(${Math.floor(140 + glow * 115)}, ${Math.floor(120 + glow * 95)}, 0)`
        : "rgb(137,117,40)";

      ctx.save();

      ctx.globalAlpha = face.alpha;
      ctx.translate(face.x, face.y);
      ctx.rotate(face.rotation);

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, face.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(-face.size * .30, -face.size * .22, face.size * .08, face.size * .22, 0, 0, Math.PI * 2);
      ctx.ellipse(face.size * .30, -face.size * .22, face.size * .08, face.size * .22, 0, 0, Math.PI * 2);
      ctx.fill();

      if (glow > .02) {
        ctx.beginPath();
        ctx.arc(0, face.size * .12, face.size * .52, 0, Math.PI, false);
        ctx.lineTo(face.size * .52, face.size * .12);
        ctx.fill();
      } else {
        ctx.strokeStyle = "#000";
        ctx.lineWidth = Math.max(4, face.size * .08);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-face.size * .42, face.size * .34);
        ctx.lineTo(face.size * .42, face.size * .34);
        ctx.stroke();
      }

      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawHotdog() {
      const x = paddle.x;
      const y = paddle.y;
      const w = paddle.w;
      const h = paddle.h;

      ctx.save();
      ctx.translate(x, y);

      // bun
      ctx.fillStyle = "#d79b4b";
      roundRect(-w / 2, -h / 2, w, h, h / 2);
      ctx.fill();

      // sausage
      ctx.fillStyle = "#a9371f";
      roundRect(-w * .46, -h * .28, w * .92, h * .56, h * .28);
      ctx.fill();

      // mustard
      ctx.strokeStyle = "#ffd829";
      ctx.lineWidth = Math.max(3, h * .14);
      ctx.lineCap = "round";
      ctx.beginPath();

      const startX = -w * .38;
      const endX = w * .38;
      const segments = 12;

      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const px = startX + (endX - startX) * t;
        const py = Math.sin(t * Math.PI * 6) * h * .13;

        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }

      ctx.stroke();

      // bun shine
      ctx.globalAlpha = .28;
      ctx.fillStyle = "#fff0b8";
      roundRect(-w * .42, -h * .42, w * .84, h * .18, h * .09);
      ctx.fill();

      ctx.restore();
    }

    function drawPoops() {
      for (const poop of poops) {
        ctx.save();
        ctx.globalAlpha = poop.alpha;
        ctx.translate(poop.x, poop.y);
        ctx.font = `${poop.size}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("💩", 0, 0);
        ctx.restore();
      }
    }

    function drawTrollHead(head) {
      if (head.delay > 0) return;

      const aspect = 0.74;
      const width = head.size * 1.8;
      const height = width * aspect;

      ctx.save();

      ctx.globalAlpha = head.alpha;
      ctx.translate(head.x, head.y);
      ctx.rotate(head.rotation);

      if (trollImg.complete && trollImg.naturalWidth > 0) {
        ctx.drawImage(trollImg, -width / 2, -height / 2, width, height);
      } else {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, width / 2, height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#111";
        ctx.font = `${head.size}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(":)", 0, 0);
      }

      ctx.restore();
    }

    function drawPopTexts() {
      for (const pop of popTexts) {
        ctx.save();

        ctx.globalAlpha = pop.alpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(65,184,188,.95)";
        ctx.font = `900 ${Math.min(W * .065, 42)}px Impact, Arial Black, sans-serif`;
        ctx.fillText(pop.text, pop.x, pop.y);

        ctx.restore();
      }
    }

    function drawOverlayText(text, timer, maxTimer, y, rotate = 0, color = "rgba(65,184,188,.92)") {
      if (timer <= 0) return;

      const alpha = Math.min(1, timer / .55);
      const scale = 1 + (maxTimer - timer) * .14;

      ctx.save();

      ctx.globalAlpha = alpha;
      ctx.translate(W / 2, y);
      ctx.rotate(rotate);
      ctx.scale(scale, scale);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.font = `900 ${Math.min(W * .22, 130)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(text, 0, 0);

      ctx.restore();
    }

    function drawMessage() {
      if (!state.message) return;

      ctx.save();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = state.message === "+ BALL" ? "rgba(65,184,188,.75)" : "rgba(0,0,0,.75)";
      ctx.font = `900 ${Math.min(W * .11, 64)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(state.message, W / 2, H * .36);

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawBackgroundTroll();
      drawScore();
      drawVisitorCounter();
      drawSmoke();

      for (const face of faces) drawFace(face);
      for (const ball of balls) {
        if (state.fireMode) drawFireball(ball);
        else drawBeachBall(ball);
      }

      drawHotdog();

      for (const head of trollHeads) drawTrollHead(head);

      drawPoops();
      drawPopTexts();

      drawOverlayText("WOW!", state.streakWowTimer, 1.25, H * .34);
      drawOverlayText("WOW!", state.milestoneWowTimer, 2.2, H * .34, state.milestoneWowSpin);

      drawMessage();
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.lastTime) / 1000 || 0);
      state.lastTime = now;

      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", sizeCanvas);

    window.addEventListener("keydown", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = true;
      if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = true;

      if (event.code === "Space") {
        event.preventDefault();
        if (!state.running) resetGame();
      }
    });

    window.addEventListener("keyup", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = false;
      if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = false;
    });

    window.addEventListener("pointerdown", event => {
      if (!state.running) resetGame();
      paddle.targetX = event.clientX;
    });

    window.addEventListener("pointermove", event => {
      paddle.targetX = event.clientX;
    });

    window.addEventListener("pointerup", () => {
      paddle.targetX = null;
    });

    window.addEventListener("pointercancel", () => {
      paddle.targetX = null;
    });

    sizeCanvas();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
