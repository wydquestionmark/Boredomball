<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Keepy Uppy</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      touch-action: none;
      user-select: none;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100dvh;
      background: white;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: rgba(65,184,188,.75);
      font: 900 18px Impact, Haettenschweiler, "Arial Black", sans-serif;
      letter-spacing: .06em;
      white-space: nowrap;
      pointer-events: none;
    }

    #gifBurst {
      position: fixed;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%) scale(1);
      max-width: 68vw;
      max-height: 58vh;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
      transition: opacity .18s linear, transform .18s linear;
    }

    #gifBurst.show {
      opacity: .72;
      transform: translate(-50%, -50%) scale(1.05);
    }

    #trollPriceWidget {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      width: 142px;
      background: #111;
      color: #9cff7c;
      border: 2px solid #aaa;
      padding: 7px 9px;
      font: bold 11px monospace;
      line-height: 1.25;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(0, 255, 90, .18);
    }

    #trollPriceWidget .title {
      color: #ffffff;
      font-size: 10px;
      letter-spacing: .05em;
    }

    #trollPriceWidget .price {
      font-size: 13px;
      margin-top: 2px;
      color: #9cff7c;
    }

    #trollPriceWidget .change {
      font-size: 10px;
      margin-top: 2px;
    }

    #trollPriceWidget .change.up {
      color: #66ff66;
    }

    #trollPriceWidget .change.down {
      color: #ff6666;
    }

  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="trollPriceWidget">
    <div class="title">$TROLL</div>
    <div class="price" id="trollPrice">$--</div>
    <div class="change" id="trollChange">24h: loading</div>
  </div>
  <img id="gifBurst" alt="" />
  <div id="hint">USE ARROW KEYS OR DRAG TO CONTROL THE BAR</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      runTransaction,
      push,
      query,
      orderByChild,
      limitToLast,
      get
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");
    const gifBurst = document.getElementById("gifBurst");

    const trollPriceEl = document.getElementById("trollPrice");
    const trollChangeEl = document.getElementById("trollChange");
    const TROLL_TOKEN_ADDRESS = "5UUH9RTDiSpq6HKS6bp4NdU9PNJpXRXuiw6ShBTBhgH2";

    async function updateTrollPrice() {
      try {
        const response = await fetch(
          `https://api.dexscreener.com/latest/dex/tokens/${TROLL_TOKEN_ADDRESS}`
        );

        const data = await response.json();
        const pairs = Array.isArray(data.pairs) ? data.pairs : [];

        const bestPair =
          pairs.find(pair => pair.chainId === "solana" && pair.priceUsd) ||
          pairs.find(pair => pair.priceUsd);

        if (!bestPair) {
          trollPriceEl.textContent = "$--";
          trollChangeEl.textContent = "24h: no data";
          trollChangeEl.className = "change";
          return;
        }

        const price = Number(bestPair.priceUsd);
        const change24h = Number(bestPair.priceChange?.h24 ?? 0);

        trollPriceEl.textContent = price >= 0.01
          ? "$" + price.toFixed(4)
          : "$" + price.toFixed(8);

        trollChangeEl.textContent =
          "24h: " + (change24h >= 0 ? "+" : "") + change24h.toFixed(2) + "%";

        trollChangeEl.className = "change " + (change24h >= 0 ? "up" : "down");
      } catch (error) {
        trollPriceEl.textContent = "$--";
        trollChangeEl.textContent = "24h: error";
        trollChangeEl.className = "change";
      }
    }


    /*
      REQUIRED FILES IN YOUR GITHUB REPO ROOT:
      index.html
      troll.png
      beachball.png
      troll1.png
      troll2.png

      GIF MILESTONES:
      Add any GIF filenames here. They must also be in your repo root.
    */
    const GIF_FILES = [
      "pearlsmile.gif",
      "cry.gif",
      "dance1.gif",
      "cig.gif",
      "openeyes.gif",
      "slide.gif",
      "rap.gif",
      "syd1.gif",
      "chris.gif",
      "eddie.gif",
      "gross.gif",
      "spidy.gif",
      "cry2.gif"
    
      // "gif2.gif",
      // "gif3.gif"
    ];

    /*
      FIREBASE GLOBAL LEADERBOARD + VISITOR COUNTER

      1. Create a Firebase project.
      2. Add a Web App.
      3. Create a Realtime Database.
      4. Copy your Firebase config here.

      Until you fill this in, the game uses localStorage as a fallback.
    */
    const firebaseConfig = {
  apiKey: "AIzaSyB1ath0dxhuz6eArxF1CXNLf8qfHsQ8lsU",
  authDomain: "boredomgame-6bd48.firebaseapp.com",
  databaseURL: "https://boredomgame-6bd48-default-rtdb.firebaseio.com",
  projectId: "boredomgame-6bd48",
  storageBucket: "boredomgame-6bd48.firebasestorage.app",
  messagingSenderId: "994233793395",
  appId: "1:994233793395:web:b5e3636cc9b38c71742306"
      
    };

    let firebaseReady = false;
    let db = null;

    function hasFirebaseConfig() {
      return Boolean(
        firebaseConfig.apiKey &&
        firebaseConfig.authDomain &&
        firebaseConfig.databaseURL &&
        firebaseConfig.projectId &&
        firebaseConfig.appId
      );
    }

    if (hasFirebaseConfig()) {
      try {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        firebaseReady = true;
      } catch (error) {
        console.warn("Firebase failed to initialize. Using local fallback.", error);
      }
    }

    const trollImg = new Image();
    trollImg.src = "troll.png";

    const beachBallImg = new Image();
    beachBallImg.src = "beachball.png";

    const trollTargetIdleImg = new Image();
    trollTargetIdleImg.src = "troll1.png";

    const trollTargetHitImg = new Image();
    trollTargetHitImg.src = "troll2.png";

    let W = window.innerWidth || 390;
    let H = window.innerHeight || 700;
    let dpr = 1;

    let balls = [];
    let targets = [];
    let targetPieces = [];
    let popTexts = [];
    let poops = [];
    let eggplants = [];
    let smokePuffs = [];
    let trollHeads = [];
    let leaderboard = [];
    let barGlow = 0;
    let gameOverLetters = [];
    let gameOverGlowText = "";
    let gameOverGlowTimer = 0;

    const keys = { left: false, right: false };

    const state = {
      score: 0,
      best: 0,
      running: true,
      gameOver: false,
      scoreSubmitted: false,
      lastTime: performance.now(),
      gravity: 1320,

      nextBallScore: 5,
      nextTargetScore: 30,
      nextTargetSpawnTimer: 0,
      nextGifScore: 12,
      nextEggplantScore: 7,

      targetStreak: 0,
      message: "",
      messageTimer: 0,

      streakWowTimer: 0,
      milestoneWowTimer: 0,
      milestoneWowSpin: 0,

      roundGotHighScore: false,

      did25Wow: false,
      did35Poops: false,
      did50Shrink: false,

      fireMode: false,
      infernoMode: false,

      visitorCount: 0,
      gifTimer: 0
    };

    try {
      state.best = Number(localStorage.getItem("keepyBest") || 0);
    } catch (e) {
      state.best = 0;
    }

    const paddle = {
      x: W / 2,
      y: H * .83,
      w: 260,
      h: 14,
      velocity: 0,
      acceleration: 4300,
      maxSpeed: 1420,
      drag: .90,
      targetX: null
    };

    async function setupGlobalStats() {
      if (firebaseReady) {
        const visitorRef = ref(db, "visitorCount");

        try {
          await runTransaction(visitorRef, current => {
            return (Number(current) || 0) + 1;
          });

          onValue(visitorRef, snapshot => {
            state.visitorCount = Number(snapshot.val() || 0);
          });

          const scoresRef = ref(db, "scores");
          onValue(scoresRef, snapshot => {
            const data = snapshot.val() || {};
            leaderboard = Object.values(data)
              .filter(item => item && item.initials && Number.isFinite(Number(item.score)))
              .sort((a, b) => Number(b.score) - Number(a.score))
              .slice(0, 5);
          });
        } catch (error) {
          console.warn("Firebase global stats failed. Using local fallback.", error);
          setupLocalStats();
        }
      } else {
        setupLocalStats();
      }
    }

    function setupLocalStats() {
      try {
        state.visitorCount = Number(localStorage.getItem("visitorCount") || 0) + 1;
        localStorage.setItem("visitorCount", state.visitorCount);
        leaderboard = JSON.parse(localStorage.getItem("localLeaderboard") || "[]")
          .sort((a, b) => Number(b.score) - Number(a.score))
          .slice(0, 5);
      } catch (e) {
        state.visitorCount = Math.floor(1000 + Math.random() * 9000);
        leaderboard = [];
      }
    }

    async function submitLeaderboardScore(initials, score) {
      const entry = {
        initials: initials.toUpperCase().slice(0, 8),
        score: Number(score),
        createdAt: Date.now()
      };

      if (firebaseReady) {
        try {
          await push(ref(db, "scores"), entry);
          return;
        } catch (error) {
          console.warn("Firebase score submit failed. Using local fallback.", error);
        }
      }

      try {
        const local = JSON.parse(localStorage.getItem("localLeaderboard") || "[]");
        local.push(entry);
        leaderboard = local
          .sort((a, b) => Number(b.score) - Number(a.score))
          .slice(0, 5);
        localStorage.setItem("localLeaderboard", JSON.stringify(local));
      } catch (e) {}
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function baseBallRadius() {
      return Math.max(30, Math.min(54, W * .045));
    }

    function currentBallRadius() {
      const progress = clamp(state.score / 20, 0, 1);
      return baseBallRadius() * (2 - progress);
    }

    function sizeCanvas() {
      W = window.innerWidth || 390;
      H = window.innerHeight || 700;
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const baseWidth = Math.max(180, Math.min(340, W * .30));
      paddle.w = state.did50Shrink ? baseWidth * (2 / 3) : baseWidth;
      paddle.h = Math.max(10, Math.min(16, H * .014));
      paddle.y = H * .83;
      paddle.x = clamp(paddle.x || W / 2, paddle.w / 2, W - paddle.w / 2);

      for (const ball of balls) {
        ball.r = currentBallRadius();
        ball.x = clamp(ball.x, ball.r, W - ball.r);
      }
    }

    function createBall(x = W / 2, y = H * .25) {
      const direction = Math.random() > .5 ? 1 : -1;
      return {
        x,
        y,
        r: currentBallRadius(),
        vx: direction * (170 + Math.random() * 240),
        vy: 60 + Math.random() * 120,
        spin: Math.random() * Math.PI * 2,
        spinVelocity: direction * (2.2 + Math.random() * 4)
      };
    }

    function createTarget() {
      const size = 60 + Math.random() * 90;
      const x = 90 + Math.random() * Math.max(1, W - 180);
      const topLimit = H * .52;
      const y = 80 + Math.random() * Math.max(80, topLimit - 160);

      targets.push({
        x, y,
        baseX: x,
        baseY: y,
        size,
        rotation: (Math.random() - .5) * .25,
        rotationSpeed: (Math.random() > .5 ? 1 : -1) * (.16 + Math.random() * .28),
        driftX: (Math.random() > .5 ? 1 : -1) * (45 + Math.random() * 85),
        driftY: (Math.random() > .5 ? 1 : -1) * (22 + Math.random() * 48),
        speedX: .7 + Math.random() * .75,
        speedY: .6 + Math.random() * .7,
        pulse: Math.random() * Math.PI * 2,
        status: "idle",
        hitTimer: 0,
        broken: false
      });
    }

    function resetGame() {
      state.score = 0;
      state.running = true;
      state.gameOver = false;
      state.scoreSubmitted = false;

      state.nextBallScore = 5;
      state.nextTargetScore = 30;
      state.nextTargetSpawnTimer = 0;
      state.nextGifScore = 12;
      state.nextEggplantScore = 7;

      state.targetStreak = 0;
      state.message = "";
      state.messageTimer = 0;

      state.streakWowTimer = 0;
      state.milestoneWowTimer = 0;
      state.milestoneWowSpin = 0;

      state.roundGotHighScore = false;

      state.did25Wow = false;
      state.did35Poops = false;
      state.did50Shrink = false;

      state.fireMode = false;
      state.infernoMode = false;

      state.gifTimer = 0;
      gifBurst.classList.remove("show");
      gifBurst.removeAttribute("src");

      barGlow = 0;
      gameOverLetters = [];
      gameOverGlowText = "";
      gameOverGlowTimer = 0;

      paddle.x = W / 2;
      paddle.velocity = 0;
      paddle.targetX = null;

      balls = [createBall(W / 2, H * .25)];
      targets = [];
      targetPieces = [];
      popTexts = [];
      poops = [];
      eggplants = [];
      smokePuffs = [];
      trollHeads = [];

      sizeCanvas();
      hint.textContent = "USE ARROW KEYS OR DRAG TO CONTROL THE BAR";
    }

    function addBall() {
      const x = clamp(paddle.x + (Math.random() - .5) * paddle.w, 70, W - 70);
      const y = Math.max(80, paddle.y - 220 - Math.random() * 130);
      balls.push(createBall(x, y));
      state.message = "+ BALL";
      state.messageTimer = .7;
    }

    function trigger25Wow() {
      state.did25Wow = true;
      state.milestoneWowTimer = 2.2;
      state.milestoneWowSpin = Math.PI * 5.5;
    }

    function triggerPoopRain() {
      state.did35Poops = true;
      for (let i = 0; i < 24; i++) {
        poops.push({
          x: Math.random() * W,
          y: -40 - Math.random() * 620,
          vy: 190 + Math.random() * 360,
          size: 17 + Math.random() * 23,
          alpha: 1,
          landed: false,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }

    function triggerEggplantRain() {
      const count = 14 + Math.floor(Math.random() * 12);

      for (let i = 0; i < count; i++) {
        eggplants.push({
          x: Math.random() * W,
          y: -40 - Math.random() * 520,
          vx: (Math.random() - .5) * 90,
          vy: 150 + Math.random() * 430,
          size: 18 + Math.random() * 34,
          rotation: (Math.random() - .5) * .9,
          rotationSpeed: (Math.random() - .5) * 4.5,
          alpha: 1,
          fadeDelay: .45 + Math.random() * .75,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }

    function checkEggplantMilestone() {
      while (state.score >= state.nextEggplantScore) {
        triggerEggplantRain();
        state.nextEggplantScore += 7;
      }
    }

    function updateEggplants(dt) {
      for (const eggplant of eggplants) {
        eggplant.wobble += dt * 4;
        eggplant.x += (eggplant.vx + Math.sin(eggplant.wobble) * 24) * dt;
        eggplant.y += eggplant.vy * dt;
        eggplant.vy += 95 * dt;
        eggplant.rotation += eggplant.rotationSpeed * dt;

        eggplant.fadeDelay -= dt;
        if (eggplant.fadeDelay <= 0 || eggplant.y > H * .76) {
          eggplant.alpha -= dt * .42;
        }
      }

      eggplants = eggplants.filter(eggplant => eggplant.alpha > 0 && eggplant.y < H + 100);
    }

    function spawnTrollFlood() {
      for (let i = 0; i < 55; i++) {
        const size = 22 + Math.random() * 42;
        trollHeads.push({
          x: Math.random() * W,
          y: -size - Math.random() * 1300,
          vx: (Math.random() - .5) * 140,
          vy: 190 + Math.random() * 460,
          size,
          rotation: (Math.random() - .5) * 1.6,
          rotationSpeed: (Math.random() - .5) * 3.2,
          alpha: 1,
          delay: Math.random() * 1.4,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }

    function triggerRandomGif() {
      if (!GIF_FILES.length) return;

      const pick = GIF_FILES[Math.floor(Math.random() * GIF_FILES.length)];
      gifBurst.src = pick + "?v=" + Date.now();
      gifBurst.classList.add("show");
      state.gifTimer = 2.8;
    }

    function checkGifMilestone() {
      while (state.score >= state.nextGifScore) {
        triggerRandomGif();
        state.nextGifScore += 12;
      }
    }

    function checkMilestones() {
      if (state.score >= 25 && !state.did25Wow) trigger25Wow();
      if (state.score >= 35 && !state.did35Poops) triggerPoopRain();

      if (state.score >= 50 && !state.did50Shrink) {
        state.did50Shrink = true;
        state.fireMode = true;
        paddle.w *= 2 / 3;
        state.message = "FIRE MODE";
        state.messageTimer = 1.2;
      }

      if (state.score >= 60 && !state.infernoMode) {
        state.infernoMode = true;
        state.message = "INFERNO";
        state.messageTimer = 1.4;
      }
    }

    function addScore(amount = 1) {
      state.score += amount;

      for (const ball of balls) {
        ball.r = currentBallRadius();
      }

      if (state.score > state.best) {
        state.best = state.score;
        state.roundGotHighScore = true;
        try { localStorage.setItem("keepyBest", state.best); } catch (e) {}
      }

      while (state.score >= state.nextBallScore) {
        addBall();
        state.nextBallScore += 5;
      }

      if (state.score >= state.nextTargetScore) {
        state.nextTargetSpawnTimer = 0;
        state.nextTargetScore += 3;
      }

      checkGifMilestone();
      checkEggplantMilestone();
      checkMilestones();
    }

    function updatePaddle(dt) {
      if (paddle.targetX !== null) {
        const desiredVelocity = (paddle.targetX - paddle.x) * 14;
        paddle.velocity += (desiredVelocity - paddle.velocity) * Math.min(1, dt * 10);
      } else {
        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        if (dir !== 0) paddle.velocity += dir * paddle.acceleration * dt;
        else paddle.velocity *= Math.pow(paddle.drag, dt * 60);
      }

      paddle.velocity = clamp(paddle.velocity, -paddle.maxSpeed, paddle.maxSpeed);
      paddle.x += paddle.velocity * dt;

      if (paddle.x < paddle.w / 2) {
        paddle.x = paddle.w / 2;
        paddle.velocity *= -0.2;
      }

      if (paddle.x > W - paddle.w / 2) {
        paddle.x = W - paddle.w / 2;
        paddle.velocity *= -0.2;
      }
    }

    function updateTargets(dt) {
      if (state.score >= 30 && targets.length < 1 && state.running) {
        state.nextTargetSpawnTimer -= dt;
        if (state.nextTargetSpawnTimer <= 0) {
          createTarget();
          state.nextTargetSpawnTimer = 1.2 + Math.random() * 1.8;
        }
      }

      for (const target of targets) {
        target.pulse += dt;
        target.x = target.baseX + Math.sin(target.pulse * target.speedX) * target.driftX;
        target.y = target.baseY + Math.cos(target.pulse * target.speedY) * target.driftY;
        target.rotation += target.rotationSpeed * dt;

        if (target.status === "hit") {
          target.hitTimer -= dt;
          if (target.hitTimer <= 0) shatterTarget(target);
        }
      }

      targets = targets.filter(target => !target.broken);
    }

    function updateTargetPieces(dt) {
      for (const piece of targetPieces) {
        piece.vy += 980 * dt;
        piece.x += piece.vx * dt;
        piece.y += piece.vy * dt;
        piece.rotation += piece.rotationSpeed * dt;
        piece.alpha -= dt * .16;
      }

      targetPieces = targetPieces.filter(piece => piece.alpha > 0 && piece.y < H + 180);
    }

    function hitTarget(target) {
      if (target.status !== "idle") return;

      target.status = "hit";
      target.hitTimer = 1.0;
      target.rotationSpeed *= 0.2;

      state.targetStreak += 1;
      addScore(3);

      popTexts.push({
        text: "+3!",
        x: target.x,
        y: target.y,
        vy: -42,
        life: .75,
        alpha: 1
      });

      if (state.targetStreak >= 3) {
        state.streakWowTimer = 1.25;
        state.targetStreak = 0;
      }
    }

    function shatterTarget(target) {
      if (target.broken) return;
      target.broken = true;

      const img = trollTargetHitImg;
      const gridX = 4;
      const gridY = 4;
      const targetW = target.size * 1.2;
      const targetH = target.size;

      for (let row = 0; row < gridY; row++) {
        for (let col = 0; col < gridX; col++) {
          const localX = (col - (gridX - 1) / 2) * (targetW / gridX);
          const localY = (row - (gridY - 1) / 2) * (targetH / gridY);

          const a = target.rotation;
          const worldX = target.x + localX * Math.cos(a) - localY * Math.sin(a);
          const worldY = target.y + localX * Math.sin(a) + localY * Math.cos(a);

          targetPieces.push({
            x: worldX,
            y: worldY,
            sx: col / gridX,
            sy: row / gridY,
            sw: 1 / gridX,
            sh: 1 / gridY,
            w: targetW / gridX,
            h: targetH / gridY,
            vx: (col - (gridX - 1) / 2) * 85 + (Math.random() - .5) * 170,
            vy: -210 + row * 45 + Math.random() * 120,
            rotation: target.rotation + (Math.random() - .5) * .9,
            rotationSpeed: (Math.random() - .5) * 5.5,
            alpha: 1,
            img
          });
        }
      }
    }

    function touchTarget(ball, target) {
      if (target.status !== "idle") return;
      const dx = ball.x - target.x;
      const dy = ball.y - target.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < target.size * .58 + ball.r) hitTarget(target);
    }

    function updateSmoke(dt) {
      if (state.fireMode && state.running) {
        for (const ball of balls) {
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

          if (speed > 80) {
            const angle = Math.atan2(ball.vy, ball.vx) + Math.PI;
            const count = state.infernoMode ? 3 : 1;

            for (let i = 0; i < count; i++) {
              smokePuffs.push({
                x: ball.x + Math.cos(angle) * ball.r * .8 + (Math.random() - .5) * ball.r * .5,
                y: ball.y + Math.sin(angle) * ball.r * .8 + (Math.random() - .5) * ball.r * .5,
                vx: Math.cos(angle) * (20 + Math.random() * 60) + (Math.random() - .5) * 24,
                vy: Math.sin(angle) * (20 + Math.random() * 60) - 18 - Math.random() * 18,
                r: ball.r * (.22 + Math.random() * .26),
                life: .75 + Math.random() * .45,
                maxLife: 1.2,
                alpha: state.infernoMode ? .38 + Math.random() * .28 : .26 + Math.random() * .22,
                ember: state.infernoMode && Math.random() > .55
              });
            }
          }
        }
      }

      for (const puff of smokePuffs) {
        puff.life -= dt;
        puff.x += puff.vx * dt;
        puff.y += puff.vy * dt;
        puff.vx *= Math.pow(.985, dt * 60);
        puff.vy += puff.ember ? 80 * dt : -6 * dt;
        puff.r += puff.ember ? 4 * dt : 12 * dt;
      }

      smokePuffs = smokePuffs.filter(puff => puff.life > 0);
    }

    function updatePoops(dt) {
      for (const poop of poops) {
        if (!poop.landed) {
          poop.y += poop.vy * dt;
          poop.x += Math.sin(performance.now() * .002 + poop.wobble) * .8;

          const paddleTop = paddle.y - paddle.h / 2;
          const hitsBar = poop.y + poop.size * .45 >= paddleTop &&
            poop.x > paddle.x - paddle.w / 2 &&
            poop.x < paddle.x + paddle.w / 2;

          if (hitsBar) {
            poop.landed = true;
            poop.y = paddleTop - poop.size * .18;
          }
        } else {
          poop.alpha -= dt * .22;
        }
      }

      poops = poops.filter(poop => poop.alpha > 0 && poop.y < H + 80);
    }

    function updateTrollHeads(dt) {
      for (const head of trollHeads) {
        if (head.delay > 0) {
          head.delay -= dt;
          continue;
        }

        head.wobble += dt * 2.2;
        head.x += (head.vx + Math.sin(head.wobble) * 18) * dt;
        head.y += head.vy * dt;
        head.vy += 95 * dt;
        head.rotation += head.rotationSpeed * dt;

        if (head.y > H * .72) head.alpha -= dt * .45;
      }

      trollHeads = trollHeads.filter(head => head.alpha > 0 && head.y < H + 240);
    }

    function spawnGameOverExplosion(text) {
      gameOverLetters = [];
      gameOverGlowText = "";
      gameOverGlowTimer = 0;
      const chars = text.split("");
      const fontSize = Math.min(W * .11, 64);
      const spacing = fontSize * .58;
      const total = (chars.length - 1) * spacing;
      const startX = W / 2 - total / 2;
      const y = H * .36;

      for (let i = 0; i < chars.length; i++) {
        const char = chars[i];
        const angle = -Math.PI / 2 + (Math.random() - .5) * Math.PI * 1.4;
        const speed = 220 + Math.random() * 520;

        gameOverLetters.push({
          char,
          x: startX + i * spacing,
          y,
          vx: Math.cos(angle) * speed + (i - chars.length / 2) * 18,
          vy: Math.sin(angle) * speed,
          rotation: (Math.random() - .5) * .7,
          rotationSpeed: (Math.random() - .5) * 8,
          size: fontSize,
          alpha: 1,
          life: 1.65
        });
      }
    }

    function updateGameOverLetters(dt) {
      for (const letter of gameOverLetters) {
        letter.life -= dt;
        letter.x += letter.vx * dt;
        letter.y += letter.vy * dt;
        letter.vy += 760 * dt;
        letter.rotation += letter.rotationSpeed * dt;
        letter.alpha = Math.max(0, letter.life / 1.65);
      }

      gameOverLetters = gameOverLetters.filter(letter => letter.alpha > 0 && letter.y < H + 180);
    }

    function updateBall(ball, dt) {
      ball.vy += state.gravity * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.spin += ball.spinVelocity * dt;

      ball.r += (currentBallRadius() - ball.r) * Math.min(1, dt * 4);

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx) * .92;
      }

      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx) * .92;
      }

      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy) * .72;
      }

      for (const target of targets) touchTarget(ball, target);

      const paddleTop = paddle.y - paddle.h / 2;
      const paddleLeft = paddle.x - paddle.w / 2;
      const paddleRight = paddle.x + paddle.w / 2;
      const ballBottom = ball.y + ball.r;

      const movingDown = ball.vy > 0;
      const crossingBar = ballBottom >= paddleTop && ballBottom <= paddleTop + 42;
      const touchingBar = ball.x >= paddleLeft - ball.r * .25 && ball.x <= paddleRight + ball.r * .25;

      if (movingDown && crossingBar && touchingBar) {
        const hitPosition = (ball.x - paddle.x) / (paddle.w / 2);
        const randomBounce = 760 + Math.random() * 520;
        const carryBounce = Math.abs(ball.vy) * (.78 + Math.random() * .28);

        ball.y = paddleTop - ball.r;
        ball.vy = -Math.max(randomBounce, carryBounce);
        ball.vx += hitPosition * (320 + Math.random() * 320) + paddle.velocity * .48;
        ball.vx = clamp(ball.vx, -900, 900);
        ball.spinVelocity = ball.vx * (.012 + Math.random() * .02);

        barGlow = Math.min(2, Math.abs(ball.vy) / 600);

        state.targetStreak = 0;
        addScore(1);
      }
    }

    function triggerGameOver() {
      if (state.gameOver) return;

      state.gameOver = true;
      state.running = false;

      const endText = state.roundGotHighScore ? "HIGH SCORE!!!" : "GAME OVER";

      state.message = "";
      gameOverLetters = [];
      gameOverGlowText = endText;
      gameOverGlowTimer = 3.0;

      hint.textContent = "TAP OR SPACE TO RESTART";

      spawnTrollFlood();
      askForScoreSubmit();
    }

    function update(dt) {
      updatePoops(dt);
      updateEggplants(dt);
      updateTrollHeads(dt);
      updateSmoke(dt);
      updateTargetPieces(dt);
      updateGameOverLetters(dt);

      if (gameOverGlowTimer > 0) {
        gameOverGlowTimer -= dt;
        if (gameOverGlowTimer <= 0 && gameOverGlowText) {
          spawnGameOverExplosion(gameOverGlowText);
          gameOverGlowText = "";
        }
      }

      barGlow *= Math.pow(.92, dt * 60);

      if (state.gifTimer > 0) {
        state.gifTimer -= dt;
        if (state.gifTimer <= 0) {
          gifBurst.classList.remove("show");
        }
      }

      if (state.running) {
        updatePaddle(dt);
        updateTargets(dt);

        for (const ball of balls) updateBall(ball, dt);

        balls = balls.filter(ball => ball.y - ball.r <= H);

        if (balls.length === 0) triggerGameOver();
      }

      if (state.messageTimer > 0) {
        state.messageTimer -= dt;
        if (state.messageTimer <= 0) state.message = "";
      }

      if (state.streakWowTimer > 0) state.streakWowTimer -= dt;

      if (state.milestoneWowTimer > 0) {
        state.milestoneWowTimer -= dt;
        state.milestoneWowSpin *= .965;
      }

      for (const pop of popTexts) {
        pop.life -= dt;
        pop.y += pop.vy * dt;
        pop.alpha = Math.max(0, pop.life / .7);
      }

      popTexts = popTexts.filter(pop => pop.life > 0);
    }

    function askForScoreSubmit() {
      if (state.scoreSubmitted || state.score <= 0) return;
      state.scoreSubmitted = true;

      setTimeout(() => {
        const raw = prompt(`Score: ${state.score}\nEnter a name up to 8 letters/numbers:`, "PLAYER");
        if (!raw) return;

        const initials = raw.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
        if (initials.length < 1) return;

        submitLeaderboardScore(initials, state.score);
      }, 350);
    }

    function drawBackgroundTroll() {
      if (!(trollImg.complete && trollImg.naturalWidth > 0)) return;

      const width = W * 1.1;
      const height = width * 0.74;

      ctx.save();
      ctx.globalAlpha = 0.05;
      ctx.translate(W / 2, H * .45);
      ctx.drawImage(trollImg, -width / 2, -height / 2, width, height);
      ctx.restore();
    }

    function drawVisitorCounter() {
      const text = String(state.visitorCount).padStart(6, "0");
      const x = W - 14;
      const y = 14;

      ctx.save();
      ctx.textAlign = "right";
      ctx.textBaseline = "top";
      ctx.font = "bold 16px monospace";

      const boxW = 156;
      const boxH = 25;

      ctx.fillStyle = "#111";
      ctx.fillRect(x - boxW, y, boxW, boxH);

      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 2;
      ctx.strokeRect(x - boxW, y, boxW, boxH);

      ctx.fillStyle = "#9cff7c";
      ctx.fillText(text, x - 8, y + 4);

      ctx.font = "8px monospace";
      ctx.fillStyle = "#555";
      ctx.textAlign = "center";
      ctx.fillText("VISITS", x - boxW / 2, y + boxH + 3);

      drawLeaderboard(x - boxW, y + boxH + 18, boxW);

      ctx.restore();
    }

    function drawLeaderboard(x, y, width) {
      ctx.save();

      ctx.fillStyle = "rgba(0,0,0,.82)";
      ctx.fillRect(x, y, width, 92);

      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, width, 92);

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.font = "bold 9px monospace";
      ctx.fillStyle = "#9cff7c";
      ctx.fillText("TOP 5", x + width / 2, y + 5);

      ctx.textAlign = "left";
      ctx.font = "bold 9px monospace";

      for (let i = 0; i < 5; i++) {
        const entry = leaderboard[i];
        const label = entry
          ? `${i + 1}. ${String(entry.initials).slice(0, 8).padEnd(8, " ")} ${String(entry.score).padStart(3, "0")}`
          : `${i + 1}. -------- ---`;

        ctx.fillText(label, x + 8, y + 20 + i * 13);
      }

      ctx.restore();
    }

    function drawScore() {
      const hue = (state.score * 7) % 360;
      const mainColor = `hsla(${hue}, 78%, 52%, .34)`;
      const bestColor = `hsla(${(hue + 35) % 360}, 78%, 45%, .42)`;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillStyle = mainColor;
      ctx.font = `900 ${Math.min(W * .34, H * .28)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(String(state.score).padStart(3, "0"), W / 2, H * .47);

      ctx.font = `900 ${Math.min(W * .075, 46)}px Impact, Arial Black, sans-serif`;
      ctx.fillStyle = bestColor;
      ctx.fillText("BEST " + String(state.best).padStart(3, "0"), W / 2, H * .64);

      ctx.restore();
    }

    function drawBeachBall(ball) {
      const size = ball.r * 2;

      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.rotate(ball.spin);

      if (beachBallImg.complete && beachBallImg.naturalWidth > 0) {
        ctx.drawImage(beachBallImg, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = "#ddd";
        ctx.beginPath();
        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSmoke() {
      for (const puff of smokePuffs) {
        const alpha = puff.alpha * Math.max(0, puff.life / puff.maxLife);

        ctx.save();
        ctx.globalAlpha = alpha;

        const grad = ctx.createRadialGradient(puff.x, puff.y, 1, puff.x, puff.y, puff.r);

        if (puff.ember) {
          grad.addColorStop(0, "rgba(255,220,120,.95)");
          grad.addColorStop(.35, "rgba(255,120,0,.75)");
          grad.addColorStop(.75, "rgba(180,20,0,.18)");
          grad.addColorStop(1, "rgba(0,0,0,0)");
        } else {
          grad.addColorStop(0, "rgba(65,65,65,.55)");
          grad.addColorStop(.55, "rgba(95,95,95,.22)");
          grad.addColorStop(1, "rgba(120,120,120,0)");
        }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(puff.x, puff.y, puff.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function drawFireball(ball) {
      drawBeachBall(ball);

      const time = performance.now() * .006;
      const pulse = state.infernoMode
        ? 1 + Math.sin(time * 4.2) * .22
        : .75 + Math.sin(time * 2.3) * .12;

      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.globalCompositeOperation = "lighter";

      if (state.infernoMode) {
        ctx.shadowBlur = ball.r * 1.4;
        ctx.shadowColor = "rgba(255,80,0,.95)";
      }

      const glow = ctx.createRadialGradient(0, 0, ball.r * .72, 0, 0, ball.r * 1.35 * pulse);
      glow.addColorStop(0, "rgba(255,120,0,0)");
      glow.addColorStop(.55, "rgba(255,145,0,.16)");
      glow.addColorStop(.78, "rgba(255,60,0,.48)");
      glow.addColorStop(1, "rgba(255,0,0,0)");

      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, ball.r * 1.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = Math.max(3, ball.r * .11);
      ctx.strokeStyle = "rgba(255,170,30,.82)";
      ctx.beginPath();

      for (let i = 0; i <= 40; i++) {
        const a = (i / 40) * Math.PI * 2;
        const wobble = Math.sin(a * 7 + time * 4) * ball.r * .035;
        const rr = ball.r * 1.05 + wobble;
        const px = Math.cos(a) * rr;
        const py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }

      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawTarget(target) {
      const img = target.status === "hit" ? trollTargetHitImg : trollTargetIdleImg;
      const w = target.size * 1.2;
      const h = target.size;

      ctx.save();
      ctx.translate(target.x, target.y);
      ctx.rotate(target.rotation);

      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, -w / 2, -h / 2, w, h);
      } else {
        ctx.fillStyle = "#eee";
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawTargetPieces() {
      for (const piece of targetPieces) {
        ctx.save();
        ctx.globalAlpha = piece.alpha;
        ctx.translate(piece.x, piece.y);
        ctx.rotate(piece.rotation);

        const img = piece.img;
        if (img.complete && img.naturalWidth > 0) {
          const sourceW = img.naturalWidth * piece.sw;
          const sourceH = img.naturalHeight * piece.sh;
          const sourceX = img.naturalWidth * piece.sx;
          const sourceY = img.naturalHeight * piece.sy;

          ctx.drawImage(
            img,
            sourceX,
            sourceY,
            sourceW,
            sourceH,
            -piece.w / 2,
            -piece.h / 2,
            piece.w,
            piece.h
          );
        } else {
          ctx.fillStyle = "#ddd";
          ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
        }

        ctx.restore();
      }
    }

    function drawGlowingGreenBar() {
      const x = paddle.x;
      const y = paddle.y;
      const w = paddle.w;
      const h = paddle.h;

      ctx.save();
      ctx.translate(x, y);

      ctx.shadowBlur = 18 + barGlow * 42;
      ctx.shadowColor = `rgba(0,255,100,${0.72 + Math.min(barGlow, 1) * 0.28})`;

      const grad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
      grad.addColorStop(0, "#00aa44");
      grad.addColorStop(0.5, "#73ff9d");
      grad.addColorStop(1, "#00aa44");

      ctx.fillStyle = grad;
      roundRect(-w / 2, -h / 2, w, h, h / 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(230,255,230,${0.72 + Math.min(barGlow, 1) * 0.25})`;
      roundRect(-w / 2 + 4, -h / 4, w - 8, h / 2, h / 4);
      ctx.fill();

      if (barGlow > 0.08) {
        ctx.globalAlpha = Math.min(0.8, barGlow * 0.55);
        ctx.fillStyle = "#ffffff";
        roundRect(-w / 2 + 8, -h * 0.18, w - 16, h * 0.36, h * 0.18);
        ctx.fill();
      }

      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawEggplants() {
      for (const eggplant of eggplants) {
        ctx.save();
        ctx.globalAlpha = eggplant.alpha;
        ctx.translate(eggplant.x, eggplant.y);
        ctx.rotate(eggplant.rotation);
        ctx.font = `${eggplant.size}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🍆", 0, 0);
        ctx.restore();
      }
    }

    function drawPoops() {
      for (const poop of poops) {
        ctx.save();
        ctx.globalAlpha = poop.alpha;
        ctx.translate(poop.x, poop.y);
        ctx.font = `${poop.size}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("💩", 0, 0);
        ctx.restore();
      }
    }

    function drawTrollHead(head) {
      if (head.delay > 0) return;

      const aspect = 0.74;
      const width = head.size * 1.8;
      const height = width * aspect;

      ctx.save();
      ctx.globalAlpha = head.alpha;
      ctx.translate(head.x, head.y);
      ctx.rotate(head.rotation);

      if (trollImg.complete && trollImg.naturalWidth > 0) {
        ctx.drawImage(trollImg, -width / 2, -height / 2, width, height);
      } else {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, width / 2, height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPopTexts() {
      for (const pop of popTexts) {
        ctx.save();
        ctx.globalAlpha = pop.alpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(65,184,188,.95)";
        ctx.font = `900 ${Math.min(W * .065, 42)}px Impact, Arial Black, sans-serif`;
        ctx.fillText(pop.text, pop.x, pop.y);
        ctx.restore();
      }
    }

    function drawGameOverGlow() {
      if (!gameOverGlowText || gameOverGlowTimer <= 0) return;

      const pulse = 0.65 + Math.sin(performance.now() * .012) * .35;
      const alpha = Math.min(1, gameOverGlowTimer / .35);
      const size = Math.min(W * .13, 82);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${size}px Impact, Arial Black, sans-serif`;

      ctx.shadowBlur = 22 + pulse * 38;
      ctx.shadowColor = "rgba(255, 0, 0, .95)";
      ctx.fillStyle = "rgba(255, 20, 20, .95)";
      ctx.fillText(gameOverGlowText, W / 2, H * .36);

      ctx.shadowBlur = 0;
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.strokeText(gameOverGlowText, W / 2, H * .36);

      ctx.restore();
    }

    function drawGameOverLetters() {
      for (const letter of gameOverLetters) {
        ctx.save();
        ctx.globalAlpha = letter.alpha;
        ctx.translate(letter.x, letter.y);
        ctx.rotate(letter.rotation);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(0,0,0,.78)";
        ctx.font = `900 ${letter.size}px Impact, Arial Black, sans-serif`;
        ctx.fillText(letter.char, 0, 0);
        ctx.restore();
      }
    }

    function drawOverlayText(text, timer, maxTimer, y, rotate = 0, color = "rgba(65,184,188,.92)") {
      if (timer <= 0) return;

      const alpha = Math.min(1, timer / .55);
      const scale = 1 + (maxTimer - timer) * .14;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(W / 2, y);
      ctx.rotate(rotate);
      ctx.scale(scale, scale);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.font = `900 ${Math.min(W * .22, 130)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawMessage() {
      if (!state.message) return;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = state.message === "+ BALL" ? "rgba(65,184,188,.75)" : "rgba(0,0,0,.75)";
      ctx.font = `900 ${Math.min(W * .11, 64)}px Impact, Arial Black, sans-serif`;
      ctx.fillText(state.message, W / 2, H * .36);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawBackgroundTroll();
      drawScore();
      drawVisitorCounter();
      drawSmoke();

      for (const target of targets) drawTarget(target);
      drawTargetPieces();

      for (const ball of balls) {
        if (state.fireMode) drawFireball(ball);
        else drawBeachBall(ball);
      }

      drawGlowingGreenBar();

      for (const head of trollHeads) drawTrollHead(head);

      drawEggplants();
      drawPoops();
      drawPopTexts();

      drawOverlayText("WOW!", state.streakWowTimer, 1.25, H * .34);
      drawOverlayText("WOW!", state.milestoneWowTimer, 2.2, H * .34, state.milestoneWowSpin);

      drawGameOverGlow();
      drawGameOverLetters();
      drawMessage();
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.lastTime) / 1000 || 0);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", sizeCanvas);

    window.addEventListener("keydown", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = true;
      if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = true;

      if (event.code === "Space") {
        event.preventDefault();
        if (!state.running) resetGame();
      }
    });

    window.addEventListener("keyup", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = false;
      if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = false;
    });

    window.addEventListener("pointerdown", event => {
      if (!state.running) resetGame();
      paddle.targetX = event.clientX;
    });

    window.addEventListener("pointermove", event => {
      paddle.targetX = event.clientX;
    });

    window.addEventListener("pointerup", () => {
      paddle.targetX = null;
    });

    window.addEventListener("pointercancel", () => {
      paddle.targetX = null;
    });

    sizeCanvas();
    resetGame();
    setupGlobalStats();
    updateTrollPrice();
    setInterval(updateTrollPrice, 60000);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
